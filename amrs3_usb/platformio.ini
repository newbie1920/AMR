; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-n16r8]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
upload_protocol = espota
upload_port = 192.168.1.111
monitor_port = socket://192.168.1.111:23
monitor_speed = 115200
board_build.partitions = default_16MB.csv
build_src_filter = +<main.cpp> -<main1.cpp>
build_flags = 
    -std=gnu++2a
build_unflags = -std=gnu++11
lib_deps = 
	links2004/WebSockets@^2.7.3
	bblanchon/ArduinoJson@^7.4.2
	tzapu/WiFiManager@^2.0.17
	adafruit/Adafruit MPU6050@^2.2.6
	jandrassy/TelnetStream@^1.3.0
	adafruit/Adafruit SSD1306@^2.5.9
	adafruit/Adafruit GFX Library@^1.11.9
	dancrank/RPLidar (DanCrank fork)@^1.0.2
	adafruit/Adafruit NeoPixel@^1.12.0

[env:esp32-s3-usb-lidar]
extends = env:esp32-s3-n16r8
build_src_filter = +<main1.cpp> -<main.cpp>
build_flags = 
    ${env:esp32-s3-n16r8.build_flags}
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
lib_deps = 
    ${env:esp32-s3-n16r8.lib_deps}
    https://github.com/bertmelis/USBHostSerial.git

