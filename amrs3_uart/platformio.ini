; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
; Stop-Process. để dừng moniter 
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-n16r8]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; ── Upload / Monitor ──────────────────────────────────
upload_protocol = esptool
upload_port = COM3
monitor_port = COM3
monitor_speed = 115200

; ── N16R8 Hardware Override ───────────────────────────
; Board esp32-s3-devkitc-1 mặc định = 8MB Flash, No PSRAM
; N16R8 = 16MB QIO Flash + 8MB OPI PSRAM → phải override
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 16MB
board_build.flash_mode = dio
board_build.partitions = default_16MB.csv

; ── Build Flags ───────────────────────────────────────
build_flags = 
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DARDUINO_USB_MODE=1

lib_deps = 
	links2004/WebSockets@^2.7.3
	bblanchon/ArduinoJson@^7.4.2
	tzapu/WiFiManager@^2.0.17
	adafruit/Adafruit MPU6050@^2.2.6
	jandrassy/TelnetStream@^1.3.0
	adafruit/Adafruit SSD1306@^2.5.9
	adafruit/Adafruit GFX Library@^1.11.9
	dancrank/RPLidar (DanCrank fork)@^1.0.2
	adafruit/Adafruit NeoPixel@^1.12.0
